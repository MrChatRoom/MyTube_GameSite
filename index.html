<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MyTube - Broadcast Yourself</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="topbar">
  <div class="logo">MyTube</div>

  <div class="nav">
    <a href="#">Home</a>
    <a href="#">Videos</a>
    <a href="#">Channels</a>
    <a href="#">Community</a>
  </div>

  <div class="login">
    <input placeholder="username">
    <input placeholder="password" type="password">
    <button>login</button>
  </div>
</div>

<div class="searchbar">
  <input placeholder="Search MyTube">
  <button>Search</button>
</div>

<div class="page">

  <div class="left">

    <div id="player" class="player">
      CLICK A VIDEO TO START
    </div>

    <div class="rating">
      Rating:
      <span id="stars">★★★☆☆</span>
    </div>

    <div class="views">
      views: <span id="viewCount">0</span>
    </div>

    <div class="chatbox">
      <div class="chat-title">LIVE CHAT</div>
      <div id="chat" class="chat"></div>
    </div>

    <div class="embed">
      <div class="embed-title">Embed this video</div>
      <textarea id="embedcode"></textarea>
    </div>

  </div>

  <div class="right">

    <div class="box">
      <div class="title">Categories</div>
      <div>Gaming</div>
      <div>Comedy</div>
      <div>Music</div>
    </div>

    <div class="box">
      <div class="title">Featured</div>

      <div class="video" onclick="loadVideo('cookie')">
        ▶ cookie clicker scuffed
      </div>

      <div class="video" onclick="loadVideo('snake')">
        ▶ snake go brrrrr in snake XP ultra
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
